# 毎朝 8:30 JST に価格データを取得して commit & push する（CI版の定期実行）。
# push は Cloudflare Pages の Git 連携が検知して本番デプロイされる。
#
# 必要な Secret（Settings > Secrets and variables > Actions）:
#   PROFIT_REPO_TOKEN  プライベートの mtg-profit-checker を読むための
#                      Fine-grained PAT（Repository access: mtg-profit-checker のみ /
#                      Permissions: Contents = Read-only）
#
# ローカルの launchd（10:30）はフォールバック: このワークフローが成功していれば
# update-all.mjs が「今日のデータは取得済み」と判断してスキップする。
name: update-data

on:
  # 手動実行（Actions タブ > update-data > Run workflow。スマホからも可）
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'セットアップ検証のみ（profit-checkerデータの取得確認までで終了）'
        type: boolean
        default: false
  schedule:
    # 22:43 UTC = 7:43 JST（利益チェッカーのローカル7:00更新の後）。
    # GitHub のスケジュール実行は混雑時に遅延・欠落する（2026-07-20は丸ごと未発火）
    # ため、2時間後にリトライ枠をもう1本設定する。当日分が取得済みの場合は
    # 下の「Skip if already updated today」ガードで何もせず終了する。
    # それでも両方落ちた日はローカルの launchd（10:30）がフォールバック実行する
    - cron: '43 22 * * *'
    - cron: '43 0 * * *'

concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Checkout profit-checker price data
        uses: actions/checkout@v4
        with:
          repository: NOJIMAX/mtg-profit-checker
          token: ${{ secrets.PROFIT_REPO_TOKEN }}
          path: profit-repo
          sparse-checkout: public/prices

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Skip if already updated today
        id: guard
        run: |
          FRESH=$(node -e "
            const cards = require('./public/data/cards.json');
            const jst = (iso) => new Date(Date.parse(iso) + 9 * 3600000).toISOString().slice(0, 10);
            console.log(jst(cards.updatedAt) === jst(new Date().toISOString()) ? 'yes' : 'no');
          ")
          echo "fresh=$FRESH" >> "$GITHUB_OUTPUT"
          [ "$FRESH" = "yes" ] && echo "今日のデータは取得済みのためスキップします" || true

      - name: Verify profit-checker data
        if: ${{ steps.guard.outputs.fresh != 'yes' }}
        run: |
          ls -la profit-repo/public/prices/
          node -e "
            const meta = require('./profit-repo/public/prices/meta.json');
            console.log('meta.updatedAt:', meta.updatedAt, '/ 晴れる屋', meta.hareruyaCount, '件 / CK', meta.cardKingdomCount, '件');
          "

      - name: Fetch market data
        if: ${{ !inputs.dry_run && steps.guard.outputs.fresh != 'yes' }}
        env:
          PROFIT_DATA_DIR: ${{ github.workspace }}/profit-repo/public/prices
        run: node scripts/fetch-market-data.mjs

      - name: Commit & push
        if: ${{ !inputs.dry_run && steps.guard.outputs.fresh != 'yes' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data data/resolve-cache.json
          if git diff --cached --quiet; then
            echo "価格データに変更がないため push しません"
            exit 0
          fi
          git commit -m "chore: 価格データ更新 ($(TZ=Asia/Tokyo date +%F) CI)"
          git pull --rebase origin main
          git push origin main
