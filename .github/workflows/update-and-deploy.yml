# main への push をトリガーに、ビルドして Cloudflare Pages にデプロイする。
#
# 価格データの取得はローカルMacの launchd（毎朝8:30）が行い、
# scripts/update-all.mjs が public/data をコミットして push してくる。
# （mtg-profit-checker と同じ「ローカル取得 + push」方式）
#
# GitHub リポジトリの Settings > Secrets and variables > Actions に以下を登録しておくこと:
#   CLOUDFLARE_API_TOKEN  (Cloudflare Pages 編集権限のAPIトークン)
#   CLOUDFLARE_ACCOUNT_ID (Cloudflare ダッシュボードに表示されるアカウントID)
name: update-and-deploy

on:
  # 手動実行用 (GitHubの Actions タブ > update-and-deploy > Run workflow)
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Create Pages project (初回のみ・存在すれば何もしない)
        uses: cloudflare/wrangler-action@v3
        continue-on-error: true
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages project create mtg-market-watch --production-branch=main

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=mtg-market-watch --branch=main
